<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let num = parseInt(prompt("Enter a number:"));
        let temp = num;
        let rev = 0;

        while (num > 0) {
            let rem = num % 10;
            rev = rev * 10 + rem;
            num = parseInt(num / 10);
        }

        if (temp == rev) {
            document.write("Palindrome Number");
        } else {
            document.write("Not a Palindrome Number");
        }
    </script>
</body>

</html>
